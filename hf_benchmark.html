<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HF Summarization Benchmark</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e25;
    --border: #252a33;
    --border-bright: #353d4a;
    --text: #e2e8f0;
    --text-dim: #8896a8;
    --text-faint: #4a5568;
    --accent: #3b82f6;
    --accent-dim: #1d4ed8;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar-logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .04em;
  }
  .topbar-sep { flex: 1; }
  .topbar-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
  .icon-btn {
    width: 34px;
    height: 34px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
  }
  .token-indicator {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .token-indicator.ready {
    color: var(--green);
    border-color: rgba(34,197,94,.35);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    width: min(540px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .06em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .modal-close {
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }
  .modal-body {
    padding: 14px;
  }
  .token-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 10px;
  }
  .token-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-faint);
  }
  .modal-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* strategy checkboxes */
  .strategy-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: background .12s;
  }
  .strategy-item:hover { background: var(--surface2); }
  .strategy-item input { display: none; }
  .strategy-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--border-bright);
    flex-shrink: 0;
    transition: all .15s;
  }
  .strategy-item input:checked ~ .strategy-dot {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 6px rgba(59,130,246,.5);
  }
  .strategy-name { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .strategy-item input:checked ~ .strategy-dot ~ .strategy-name { color: var(--text); }

  /* test cases */
  .tc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all .12s;
  }
  .tc-item:hover { background: var(--surface2); }
  .tc-item.active { border-color: var(--accent); background: rgba(59,130,246,.08); }
  .tc-item input[type=checkbox] { display: none; }
  .tc-check {
    width: 14px; height: 14px;
    border: 2px solid var(--border-bright);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .tc-check svg { display: none; }
  .tc-item input:checked ~ .tc-check {
    border-color: var(--accent);
    background: var(--accent);
  }
  .tc-item input:checked ~ .tc-check svg { display: block; }
  .tc-label { font-size: 12px; color: var(--text-dim); flex: 1; line-height: 1.3; }
  .tc-item input:checked ~ .tc-check ~ .tc-label { color: var(--text); }

  .tc-edit-btn {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
  }
  .tc-edit-btn:hover { color: var(--accent); }

  /* edit area */
  .tc-editor {
    display: none;
    margin-top: 4px;
  }
  .tc-editor.open { display: block; }
  .tc-editor textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }
  .tc-editor-actions {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .tc-editor-actions button {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }
  .tc-editor-actions button.save { border-color: var(--accent); color: var(--accent); }

  /* progress */
  .progress-wrap {
    margin: 0 16px 12px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .3s ease;
    width: 0%;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  /* ── MAIN ── */
  .main {
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 100%;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; opacity: .3; }

  /* ── SUMMARY CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.good::before { background: var(--green); }
  .card.ok::before { background: var(--yellow); }
  .card.bad::before { background: var(--red); }
  .card.neutral::before { background: var(--border-bright); }
  .card-strategy {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-verdict {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .verdict-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .card.good .verdict-dot { background: var(--green); }
  .card.ok .verdict-dot { background: var(--yellow); }
  .card.bad .verdict-dot { background: var(--red); }
  .card-metrics {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card-metric {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-metric-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }
  .card-metric-value {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
  }
  .card-metric-value.highlight { color: var(--text); }

  /* ── RESULTS TABLE ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .section-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 10px;
  }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .results-table th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-faint);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .results-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .results-table tr:hover td { background: var(--surface2); }
  .results-table tr.selected td { background: rgba(59,130,246,.08); }

  .results-table tr { cursor: pointer; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge-success { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-error { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-skipped { background: rgba(74,85,104,.2); color: var(--text-faint); }
  .badge-timeout { background: rgba(245,158,11,.15); color: var(--yellow); }
  .badge-template { background: rgba(167,139,250,.15); color: var(--purple); }
  .badge-chunked { background: rgba(167,139,250,.15); color: var(--purple); }

  .quality-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
  }
  .quality-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .quality-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .quality-fill.good { background: var(--green); }
  .quality-fill.ok { background: var(--yellow); }
  .quality-fill.bad { background: var(--red); }
  .quality-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
  }

  .mono-cell { font-family: var(--mono); }
  .dim { color: var(--text-faint); }

  /* compression indicator */
  .compression-chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .compression-chip.great { color: var(--green); background: rgba(34,197,94,.1); }
  .compression-chip.ok { color: var(--yellow); background: rgba(245,158,11,.1); }
  .compression-chip.poor { color: var(--red); background: rgba(239,68,68,.1); }

  /* ── INSPECTOR ── */
  .inspector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .inspector-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .inspector-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .inspector-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }
  .inspector-close:hover { color: var(--text); }

  .inspector-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .inspector-pane {
    padding: 16px;
    border-right: 1px solid var(--border);
  }
  .inspector-pane:last-child { border-right: none; }
  .inspector-pane-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .inspector-pane-text {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .inspector-pane-text.highlight { color: var(--text); }

  .diff-token {
    display: inline;
    border-radius: 2px;
    padding: 0 1px;
  }
  .diff-add { background: rgba(34,197,94,.2); color: var(--green); }
  .diff-del { background: rgba(239,68,68,.15); color: var(--red); text-decoration: line-through; opacity: .6; }

  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .metric-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px;
  }
  .metric-box-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .metric-box-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .metric-box-val.green { color: var(--green); }
  .metric-box-val.yellow { color: var(--yellow); }
  .metric-box-val.red { color: var(--red); }

  .quality-breakdown {
    margin-top: 12px;
  }
  .qb-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .qb-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    width: 120px;
    flex-shrink: 0;
  }
  .qb-bar {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .qb-fill { height: 100%; border-radius: 2px; }
  .qb-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    min-width: 32px;
    text-align: right;
  }

  /* spinner */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
</style>
</head>
<body>

<div class="shell">
  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-logo">◈ HF_SUMM_BENCH</span>
    <span class="topbar-tag">v2.0</span>
    <span class="token-indicator" id="tokenIndicator">token: missing</span>
    <span class="topbar-sep"></span>
    <button class="btn btn-ghost icon-btn" id="settingsBtn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M12 15.3a3.3 3.3 0 1 0 0-6.6 3.3 3.3 0 0 0 0 6.6Z"/>
        <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1 1 0 0 1 0 1.4l-1.1 1.1a1 1 0 0 1-1.4 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a1 1 0 0 1-1 1h-1.6a1 1 0 0 1-1-1v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1 1 0 0 1-1.4 0l-1.1-1.1a1 1 0 0 1 0-1.4l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a1 1 0 0 1-1-1v-1.6a1 1 0 0 1 1-1h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1 1 0 0 1 0-1.4l1.1-1.1a1 1 0 0 1 1.4 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a1 1 0 0 1 1-1h1.6a1 1 0 0 1 1 1v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a1 1 0 0 1 1.4 0l1.1 1.1a1 1 0 0 1 0 1.4l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H20a1 1 0 0 1 1 1v1.6a1 1 0 0 1-1 1h-.2a1 1 0 0 0-.9.6Z"/>
      </svg>
    </button>
    <button class="btn btn-ghost" id="clearBtn" style="margin-right:8px;">Clear</button>
    <button class="btn btn-primary" id="runBtn">▶ Run Benchmark</button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Strategies -->
    <div class="sidebar-section">
      <div class="sidebar-label">Strategies</div>
      <div id="strategyList">
        <label class="strategy-item">
          <input type="checkbox" name="strategy" value="falconsai" checked>
          <span class="strategy-dot"></span>
          <span class="strategy-name">Falconsai</span>
        </label>
        <label class="strategy-item">
          <input type="checkbox" name="strategy" value="falconsai_chunked" checked>
          <span class="strategy-dot"></span>
          <span class="strategy-name">Falconsai (chunked)</span>
        </label>
        <label class="strategy-item">
          <input type="checkbox" name="strategy" value="distilbart" checked>
          <span class="strategy-dot"></span>
          <span class="strategy-name">DistilBART</span>
        </label>
        <label class="strategy-item">
          <input type="checkbox" name="strategy" value="distilbart_chunked" checked>
          <span class="strategy-dot"></span>
          <span class="strategy-name">DistilBART (chunked)</span>
        </label>
        <label class="strategy-item">
          <input type="checkbox" name="strategy" value="bart_large" checked>
          <span class="strategy-dot"></span>
          <span class="strategy-name">BART Large CNN</span>
        </label>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function estimateTokens(text) {
  return Math.round(text.split(/\s+/).length * 1.3);
}

function jaccard(a, b) {
  const sa = new Set(a.toLowerCase().match(/\b\w{4,}\b/g) || []);
  const sb = new Set(b.toLowerCase().match(/\b\w{4,}\b/g) || []);
  if (!sa.size) return 0;
  const inter = [...sa].filter(x => sb.has(x)).length;
  const union = new Set([...sa, ...sb]).size;
  return inter / union;
}

function isTruncatedSummary(text) {
  if (!text) return false;
  return !/[.!?]$/.test(text.trim());
}

function extractKeywords(text, minLen = 6) {
  return (text.match(/\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)*\b|\b\w{6,}\b/g) || [])
    .map(w => w.toLowerCase())
    .filter(w => w.length >= minLen);
}

function sentenceEchoRate(input, output) {
  const inputSentences = input
    .split(/[.!?]+/)
    .map(s => s.trim().toLowerCase())
    .filter(Boolean);
  if (!inputSentences.length) return 0;
  const out = output.trim().toLowerCase();
  const matched = inputSentences.filter(s => out.includes(s) || s.includes(out)).length;
  return matched / inputSentences.length;
}

function keywordComponentScore(input, output, outTok, compression) {
  const outLow = output.toLowerCase();
  const keywords = extractKeywords(input, 6);
  const retained = keywords.filter(k => outLow.includes(k)).length;
  const retentionRate = keywords.length > 0 ? retained / keywords.length : 0;
  const keywordDensity = retentionRate * 10;

  let total = Math.round(keywordDensity);
  if (outTok < 15 && compression <= 0.85) total = Math.min(total, 8);
  return total;
}

function sectionCoverageScore(input, output) {
  const sentences = input
    .split(/[.!?]+/)
    .map(s => s.trim())
    .filter(Boolean);
  if (!sentences.length) return 0;

  const groupSize = Math.ceil(sentences.length / 3);
  const groups = [
    sentences.slice(0, groupSize),
    sentences.slice(groupSize, groupSize * 2),
    sentences.slice(groupSize * 2),
  ];

  const outLow = output.toLowerCase();
  let represented = 0;
  for (const group of groups) {
    if (!group.length) continue;
    const groupKeywords = [...new Set(extractKeywords(group.join(" "), 4))];
    if (!groupKeywords.length) continue;
    const hasAny = groupKeywords.some(k => outLow.includes(k));
    if (hasAny) represented += 1;
  }

  if (represented <= 0) return 0;
  if (represented === 1) return 10;
  return 20;
}

function joinNaturalList(items) {
  if (items.length <= 1) return items[0] || "";
  if (items.length === 2) return `${items[0]} and ${items[1]}`;
  return `${items.slice(0, -1).join(", ")}, and ${items[items.length - 1]}`;
}

function cleanListItem(text) {
  return text.replace(/^[\s\-–,;:.]+|[\s\-–,;:.]+$/g, "").trim();
}

function parseDetectedTopics(raw) {
  if (!raw) return [];
  return raw
    .split(",")
    .map(cleanListItem)
    .filter(Boolean);
}

function buildTemplateSummary(items) {
  const clean = items.map(cleanListItem).filter(Boolean);
  return `User explored ${clean.length} topics: ${clean.join(", ")}.`;
}

function maybeAppendTopics(summary, detectedTopics) {
  if (!detectedTopics.length) return summary;
  const outLow = summary.toLowerCase();
  const mentioned = detectedTopics.filter(t => outLow.includes(t.toLowerCase())).length;
  if (mentioned / detectedTopics.length >= 0.5) return summary;
  return `${summary.trim()} Topics: ${detectedTopics.join(", ")}.`;
}

function normalizeBenchmarkInput(rawInput) {
  const input = (rawInput || "").trim();
  let core = input;
  let detectedTopics = [];

  const detectedMatch = input.match(/^(.*?)(?:\s*Detected intents(?:\/topics)?\s*:|\s*Detected intent\s*:)\s*(.+)$/is);
  if (detectedMatch) {
    core = detectedMatch[1].trim().replace(/[.,;:\s]+$/g, "");
    detectedTopics = parseDetectedTopics(detectedMatch[2]);
  }

  let normalized = core;
  let listItems = [];
  const askedIdx = core.toLowerCase().indexOf("asked about:");
  let listOnly = false;

  if (askedIdx >= 0) {
    const pre = core.slice(0, askedIdx).trim();
    const listPart = core.slice(askedIdx + "asked about:".length).trim().replace(/[.]+$/g, "");
    listItems = listPart.split(";").map(cleanListItem).filter(Boolean);
    if (listItems.length >= 2) {
      normalized = `The user asked about ${joinNaturalList(listItems)}.`;
      const preNormalized = pre
        .toLowerCase()
        .replace(/earlier in this conversation,?/g, "")
        .replace(/the user has explored multiple datasets across this session,?/g, "")
        .replace(/the user/g, "")
        .replace(/\s+/g, " ")
        .trim();
      listOnly = preNormalized.length === 0;
    }
  }

  const templateTopics = detectedTopics.length ? detectedTopics : listItems;
  return { normalizedInput: normalized, detectedTopics, listOnly, templateTopics };
}

function splitIntoSentenceChunks(text, chunkCount = 3) {
  const sentences = text
    .split(/\.\s+/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(s => /[.!?]$/.test(s) ? s : `${s}.`);
  if (sentences.length <= 1) return [text];

  const size = Math.ceil(sentences.length / chunkCount);
  const chunks = [];
  for (let i = 0; i < sentences.length; i += size) {
    const chunk = sentences.slice(i, i + size).join(" ").trim();
    if (chunk) chunks.push(chunk);
  }
  return chunks;
}

/**
 * Improved quality score:
 * - Echo penalty (40 pts): if output is too similar to input, penalize hard
 * - Compression (20 pts): reward meaningful compression
 * - Keyword retention (25 pts): important terms preserved
 * - Coherence (15 pts): sentence structure checks
 */
function scoreQuality(input, output) {
  if (!output || output.trim() === "") return 0;

  const inTok = estimateTokens(input);
  const outTok = estimateTokens(output);
  const compression = outTok / inTok;

  // Output too short to be useful.
  if (outTok < 8) return 5;

  // 1. Echo penalty — if the model just returned the input or nearly so
  const similarity = jaccard(input, output);
  const semanticEcho = sentenceEchoRate(input, output) > 0.60;
  const isEcho = similarity > 0.85 || compression > 0.92 || semanticEcho;
  if (isEcho) return Math.round(5 + similarity * 5); // max ~10 if echo

  let score = 0;

  // 2. Compression (20 pts)
  // Ideal: 20-60% of input length
  if (compression < 0.2) score += 10;        // too short
  else if (compression <= 0.5) score += 20;  // ideal
  else if (compression <= 0.7) score += 14;
  else if (compression <= 0.85) score += 8;
  else score += 2;

  // 3. Section coverage (20) + keyword density (10)
  score += sectionCoverageScore(input, output);
  score += keywordComponentScore(input, output, outTok, compression);

  // 4. Hallucination proxy (20 pts): new capitalized words not in input
  const inputCaps = new Set((input.match(/\b[A-Z][a-z]+\b/g) || []).map(w => w.toLowerCase()));
  const outputCaps = (output.match(/\b[A-Z][a-z]+\b/g) || []).map(w => w.toLowerCase());
  const newCaps = outputCaps.filter(w => !inputCaps.has(w)).length;
  const hallucinationPenalty = Math.min(newCaps * 4, 20);
  score += (20 - hallucinationPenalty);

  // 5. Coherence (15 pts)
  const sentences = output.split(/[.!?]+/).filter(s => s.trim().length > 5);
  let coherenceScore = 0;
  if (sentences.length >= 1) coherenceScore += 5;
  if (sentences.length >= 2) coherenceScore += 5;
  const avgWordLen = output.split(/\s+/).reduce((a, w) => a + w.length, 0) / (output.split(/\s+/).length || 1);
  if (avgWordLen >= 4 && avgWordLen <= 9) coherenceScore += 5;
  if (isTruncatedSummary(output)) coherenceScore = Math.max(0, coherenceScore - 10);
  score += coherenceScore;

  return Math.min(100, Math.max(0, score));
}

function qualityClass(score) {
  if (score >= 65) return "good";
  if (score >= 40) return "ok";
  return "bad";
}

function latencyLabel(ms) {
  if (ms < 2000) return `${ms}ms`;
  return `${(ms/1000).toFixed(1)}s`;
}

function compressionClass(ratio) {
  if (ratio <= 0.55) return "great";
  if (ratio <= 0.80) return "ok";
  return "poor";
}

// ── HF CALL ──────────────────────────────────────────────────────────────────
async function callHF(strategy, input, inTokens) {
  const prep = normalizeBenchmarkInput(input);
  if (prep.listOnly && prep.templateTopics.length) {
    return {
      ok: true,
      status: "template",
      text: buildTemplateSummary(prep.templateTopics),
      normalizedInput: prep.normalizedInput,
    };
  }

  const headers = { "Content-Type": "application/json" };
  if (hfToken) headers["Authorization"] = `Bearer ${hfToken}`;

  async function hfRequestOnce(singleInput, tokenEstimate) {
    let rawMaxLen;
    if (tokenEstimate < 40) rawMaxLen = tokenEstimate;
    else if (tokenEstimate <= 80) rawMaxLen = Math.round(tokenEstimate * 0.60);
    else if (tokenEstimate <= 150) rawMaxLen = Math.round(tokenEstimate * 0.50);
    else rawMaxLen = Math.round(tokenEstimate * 0.40);
    const maxLen = Math.max(20, Math.min(200, rawMaxLen));
    const minLen = Math.round(maxLen * 0.4);

    const body = JSON.stringify({
      inputs: singleInput,
      parameters: {
        max_length: maxLen,
        min_length: minLen,
        do_sample: false,
        no_repeat_ngram_size: 3,
        length_penalty: 1.5,
        early_stopping: true,
      },
      options: { wait_for_model: true },
    });

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 30000);
    try {
      const res = await fetch(strategy.url, { method: "POST", headers, body, signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) {
        let details = "";
        try {
          const raw = await res.text();
          if (raw) {
            try {
              const parsed = JSON.parse(raw);
              details = parsed.error || parsed.message || parsed.detail || raw;
            } catch {
              details = raw;
            }
          }
        } catch {
          details = "";
        }
        const suffix = details ? ` - ${details}` : "";
        throw new Error(`HTTP ${res.status}${suffix}`);
      }
      const data = await res.json();
      if (Array.isArray(data) && data[0]?.summary_text) return data[0].summary_text;
      if (data?.summary_text) return data.summary_text;
      return JSON.stringify(data);
    } catch (e) {
      clearTimeout(timer);
      if (e.name === "AbortError") throw new Error("timeout");
      throw e;
    }
  }

  try {
    let summaryText = "";
    if (strategy.chunked) {
      const chunks = splitIntoSentenceChunks(prep.normalizedInput, 3);
      const miniSummaries = [];
      for (const chunk of chunks) {
        miniSummaries.push(await hfRequestOnce(chunk, estimateTokens(chunk)));
      }
      const mergedMini = miniSummaries.join(" ").trim();
      summaryText = await hfRequestOnce(mergedMini, estimateTokens(mergedMini));
    } else {
      summaryText = await hfRequestOnce(prep.normalizedInput, inTokens);
    }

    return {
      ok: true,
      status: "success",
      text: maybeAppendTopics(summaryText, prep.detectedTopics),
      normalizedInput: prep.normalizedInput,
    };
  } catch (e) {
    throw e;
  }
}

// ── RUN ──────────────────────────────────────────────────────────────────────
async function runBenchmark() {
  if (running) return;
  running = true;
  runBtn.disabled = true;
  runBtn.innerHTML = '<span class="spinner"></span> Running…';

  const selectedStrategies = [...document.querySelectorAll('input[name=strategy]:checked')].map(el => el.value);
  const selectedCases = [...document.querySelectorAll('.tc-checkbox:checked')].map(el => el.dataset.id);

  if (!selectedStrategies.length || !selectedCases.length) {
    alert("Select at least one strategy and one test case.");
    finishRun();
    return;
  }
  const needsHf = selectedStrategies.some(s => s !== "code_only");
  if (needsHf && !hfToken) {
    alert("Set HuggingFace token in Settings before running HF models.");
    finishRun();
    return;
  }

  const jobs = [];
  selectedCases.forEach(cid => {
    const tc = testCases.find(t => t.id === cid);
    selectedStrategies.forEach(sid => jobs.push({ tc, sid }));
  });

  results = [];
  let done = 0;
  progressWrap.classList.add('visible');

  for (const { tc, sid } of jobs) {
    progressFill.style.width = `${Math.round(done / jobs.length * 100)}%`;
    progressLabel.textContent = `${done}/${jobs.length} — ${STRATEGIES[sid].label} × ${tc.label}`;

    const inTok = estimateTokens(tc.input);
    const t0 = Date.now();
    let result = {
      tcId: tc.id, tcLabel: tc.label,
      sid, stratLabel: STRATEGIES[sid].label,
      input: tc.input, normalizedInput: tc.input,
      output: "", status: "", error: "",
      latency: 0, inTok, outTok: 0,
      compression: 1, quality: 0, isSummarized: false, isTruncated: false, isChunked: STRATEGIES[sid].chunked,
    };

    if (sid === "code_only") {
      result.output = tc.input;
      result.status = "skipped";
      result.latency = 0;
    } else if (inTok < 20) {
      result.output = tc.input;
      result.status = "skipped";
      result.latency = 0;
    } else {
      try {
        const r = await callHF(STRATEGIES[sid], tc.input, inTok);
        result.latency = r.status === "template" ? 0 : Date.now() - t0;
        result.output = r.text;
        result.status = r.status || "success";
        result.normalizedInput = r.normalizedInput || tc.input;
      } catch (e) {
        result.latency = Date.now() - t0;
        result.status = e.message === "timeout" ? "timeout" : "error";
        result.error = e.message;
        result.output = "";
      }
    }

    if (result.output) {
      result.outTok = estimateTokens(result.output);
      result.compression = result.outTok / (result.inTok || 1);
      if (result.status === "skipped") result.quality = 0;
      else if (result.status === "template") result.quality = 60;
      else result.quality = scoreQuality(tc.input, result.output);
      result.isTruncated = result.status === "success" ? isTruncatedSummary(result.output) : false;
      result.isSummarized = result.quality > 30 && result.compression < 0.88;
    }

    results.push(result);
    done++;
  }

  progressFill.style.width = "100%";
  progressLabel.textContent = `Done — ${results.length} results`;
  renderResults();
  finishRun();
}

function finishRun() {
  running = false;
  runBtn.disabled = false;
  runBtn.innerHTML = '▶ Run Benchmark';
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderResults() {
  emptyState.style.display = "none";

  // Remove old rendered sections
  main.querySelectorAll('.render-section').forEach(el => el.remove());

  // 1. Strategy summary cards
  const cardsSection = section();
  const cardsHeader = document.createElement('div');
  cardsHeader.className = 'section-header';
  cardsHeader.innerHTML = `<span class="section-title">Strategy Summary</span>`;
  cardsSection.appendChild(cardsHeader);

  const cardsGrid = document.createElement('div');
  cardsGrid.className = 'cards-grid';

  const stratIds = [...new Set(results.map(r => r.sid))];
  stratIds.forEach(sid => {
    const runs = results.filter(r => r.sid === sid && r.status !== "skipped");
    const successes = runs.filter(r => r.status === "success" || r.status === "template");
    const avgLatency = successes.length ? Math.round(successes.reduce((a, r) => a + r.latency, 0) / successes.length) : null;
    const avgQuality = successes.length ? Math.round(successes.reduce((a, r) => a + r.quality, 0) / successes.length) : 0;
    const errorRate = runs.length ? Math.round((runs.filter(r => r.status !== "success" && r.status !== "template").length / runs.length) * 100) : 0;
    const avgCompression = successes.length ? successes.reduce((a, r) => a + r.compression, 0) / successes.length : 1;

    let verdict, cardClass;
    if (!successes.length) { verdict = "No data"; cardClass = "neutral"; }
    else if (avgQuality >= 65 && avgLatency < 8000) { verdict = "✓ Recommended"; cardClass = "good"; }
    else if (avgQuality >= 40) { verdict = "~ Acceptable"; cardClass = "ok"; }
    else { verdict = "✗ Poor"; cardClass = "bad"; }

    const card = document.createElement('div');
    card.className = `card ${cardClass}`;
    card.innerHTML = `
      <div class="card-strategy">${STRATEGIES[sid].label}</div>
      <div class="card-verdict"><span class="verdict-dot"></span>${verdict}</div>
      <div class="card-metrics">
        <div class="card-metric">
          <span class="card-metric-label">Avg Quality</span>
          <span class="card-metric-value highlight">${avgQuality}/100</span>
        </div>
        <div class="card-metric">
          <span class="card-metric-label">Avg Latency</span>
          <span class="card-metric-value">${avgLatency != null ? latencyLabel(avgLatency) : '—'}</span>
        </div>
        <div class="card-metric">
          <span class="card-metric-label">Avg Compression</span>
          <span class="card-metric-value">${avgCompression < 1 ? Math.round((1-avgCompression)*100)+'% shorter' : '—'}</span>
        </div>
        <div class="card-metric">
          <span class="card-metric-label">Error Rate</span>
          <span class="card-metric-value">${errorRate}%</span>
        </div>
      </div>
    `;
    cardsGrid.appendChild(card);
  });
  cardsSection.appendChild(cardsGrid);
  main.appendChild(cardsSection);

  // 2. Results table
  const tableSection = section();
  const tableHeader = document.createElement('div');
  tableHeader.className = 'section-header';
  tableHeader.innerHTML = `
    <span class="section-title">Run Results</span>
    <span class="section-count">${results.length} rows</span>
    <span style="font-family:var(--mono); font-size:10px; color:var(--text-faint); margin-left:auto;">Click a row to inspect</span>
  `;
  tableSection.appendChild(tableHeader);

  const table = document.createElement('table');
  table.className = 'results-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>Test Case</th>
        <th>Strategy</th>
        <th>Status</th>
        <th>Quality</th>
        <th>Compression</th>
        <th>Latency</th>
        <th>Tokens in→out</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  `;
  tableSection.appendChild(table);
  main.appendChild(tableSection);

  const tbody = table.querySelector('#resultsBody');
  results.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.dataset.idx = i;

    const comprRatio = r.compression;
    const comprPct = Math.round((1 - comprRatio) * 100);
    const comprDisplay = r.status === 'skipped' || !r.output ? '—'
      : `<span class="compression-chip ${compressionClass(comprRatio)}">${comprPct > 0 ? '↓' : '↑'}${Math.abs(comprPct)}%</span>`;

    const qClass = qualityClass(r.quality);
    const qualDisplay = r.status === 'skipped' ? '<span class="dim">skipped</span>'
      : `<div class="quality-bar-wrap">
          <div class="quality-bar"><div class="quality-fill ${qClass}" style="width:${r.quality}%"></div></div>
          <span class="quality-num">${r.quality}</span>
        </div>`;

    const errTitle = r.error ? ` title="${escHtml(r.error)}"` : "";
    let statusBadge;
    if (r.status === 'success') statusBadge = '<span class="badge badge-success">● success</span>';
    else if (r.status === 'template') statusBadge = '<span class="badge badge-template">◆ template</span>';
    else if (r.status === 'error') statusBadge = `<span class="badge badge-error"${errTitle}>✕ error</span>`;
    else if (r.status === 'timeout') statusBadge = `<span class="badge badge-timeout"${errTitle}>⏱ timeout</span>`;
    else statusBadge = '<span class="badge badge-skipped">— skipped</span>';

    tr.innerHTML = `
      <td>${r.tcLabel}</td>
      <td class="mono-cell">${r.stratLabel}${r.isChunked ? ' <span class="badge badge-chunked">⛓ chunked</span>' : ''}</td>
      <td>${statusBadge}</td>
      <td>${qualDisplay}</td>
      <td>${comprDisplay}</td>
      <td class="mono-cell">${r.status === 'skipped' ? '<span class="dim">—</span>' : latencyLabel(r.latency)}</td>
      <td class="mono-cell dim">${r.inTok}→${r.outTok || 0}</td>
    `;
    tr.addEventListener('click', () => showInspector(i, tr));
    tbody.appendChild(tr);
  });

  // 3. Inspector placeholder
  const inspSection = section();
  inspSection.id = 'inspectorSection';
  inspSection.style.display = 'none';
  main.appendChild(inspSection);
}

function section() {
  const el = document.createElement('div');
  el.className = 'render-section';
  return el;
}

function showInspector(idx, tr) {
  // deselect old
  if (selectedRow) selectedRow.classList.remove('selected');
  selectedRow = tr;
  tr.classList.add('selected');

  const r = results[idx];
  const inspSection = document.getElementById('inspectorSection');
  inspSection.style.display = 'block';

  // diff view
  const diffHtml = buildDiff(r.input, r.output || "");

  // quality breakdown
  const comprScore = (() => {
    const ratio = r.compression;
    if (ratio <= 0.5) return 20;
    if (ratio <= 0.7) return 14;
    if (ratio <= 0.85) return 8;
    return 2;
  })();
  const kwScore = (() => {
    if (!r.output) return 0;
    return keywordComponentScore(r.input, r.output, r.outTok || 0, r.compression || 1);
  })();
  const sectionScore = (() => {
    if (!r.output) return 0;
    return sectionCoverageScore(r.input, r.output);
  })();
  const hallScore = (() => {
    if (!r.output) return 0;
    const inputCaps = new Set((r.input.match(/\b[A-Z][a-z]+\b/g) || []).map(w => w.toLowerCase()));
    const newCaps = (r.output.match(/\b[A-Z][a-z]+\b/g) || []).map(w => w.toLowerCase()).filter(w => !inputCaps.has(w)).length;
    return Math.max(0, 20 - newCaps * 4);
  })();
  const cohScore = r.quality - comprScore - kwScore - sectionScore - hallScore;

  const similarity = jaccard(r.input, r.output || "");
  const isEcho = similarity > 0.85 || r.compression > 0.92;

  inspSection.innerHTML = `
    <div class="inspector">
      <div class="inspector-header">
        <span class="inspector-title">Inspector — ${r.tcLabel} × ${r.stratLabel}</span>
        ${r.status !== 'success' ? `<span class="badge badge-${r.status}" style="margin-left:8px;">${r.status}</span>` : ''}
        <button class="inspector-close" onclick="closeInspector()">✕</button>
      </div>
      <div class="inspector-body">
        <div class="inspector-pane">
          <div class="inspector-pane-label">Input</div>
          <div class="inspector-pane-text"><span class="dim">Original</span>\n${escHtml(r.input)}</div>
          <div class="inspector-pane-text" style="margin-top:10px;"><span class="dim">Normalized</span>\n${escHtml(r.normalizedInput || r.input)}</div>
        </div>
        <div class="inspector-pane">
          <div class="inspector-pane-label">Output ${isEcho && r.status === 'success' ? '<span style="color:var(--red); font-size:10px;">⚠ echo detected</span>' : ''} ${r.isTruncated && r.status === 'success' ? '<span style="color:var(--yellow); font-size:10px;">⚠ truncated</span>' : ''}</div>
          <div class="inspector-pane-text highlight">${r.output ? escHtml(r.output) : '<span class="dim">No output</span>'}</div>
        </div>
        <div class="inspector-pane">
          <div class="inspector-pane-label">Metrics</div>
          <div class="metric-grid">
            <div class="metric-box">
              <div class="metric-box-label">Quality</div>
              <div class="metric-box-val ${qualityClass(r.quality)}">${r.quality}</div>
            </div>
            <div class="metric-box">
              <div class="metric-box-label">Latency</div>
              <div class="metric-box-val">${r.status === 'skipped' ? '—' : latencyLabel(r.latency)}</div>
            </div>
            <div class="metric-box">
              <div class="metric-box-label">Compression</div>
              <div class="metric-box-val">${r.output ? Math.round((1-r.compression)*100)+'%' : '—'}</div>
            </div>
            <div class="metric-box">
              <div class="metric-box-label">Tokens</div>
              <div class="metric-box-val" style="font-size:13px;">${r.inTok}→${r.outTok}</div>
            </div>
          </div>
          ${r.status === 'success' ? `
          <div class="quality-breakdown">
            <div class="inspector-pane-label" style="margin-bottom:8px;">Quality Breakdown</div>
            ${isEcho ? '<div style="font-family:var(--mono); font-size:11px; color:var(--red); margin-bottom:8px;">Echo penalty applied — model repeated input</div>' : ''}
            ${qbRow('Compression', comprScore, 20)}
            ${qbRow('Keyword Density', kwScore, 10)}
            ${qbRow('Hallucination Guard', hallScore, 20)}
            ${qbRow('Section Coverage', sectionScore, 20)}
            ${qbRow('Coherence', Math.max(0, cohScore), 15)}
          </div>` : ''}
          ${r.error ? `<div style="margin-top:12px; font-family:var(--mono); font-size:11px; color:var(--red);">${escHtml(r.error)}</div>` : ''}
        </div>
      </div>
    </div>
  `;

  inspSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function qbRow(label, score, max) {
  const pct = Math.round((score / max) * 100);
  const color = pct >= 65 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  return `
    <div class="qb-item">
      <span class="qb-label">${label}</span>
      <div class="qb-bar"><div class="qb-fill" style="width:${pct}%; background:${color};"></div></div>
      <span class="qb-val">${score}/${max}</span>
    </div>
  `;
}

function buildDiff(a, b) {
  if (!b) return escHtml(a);
  const aWords = a.split(/(\s+)/);
  const bWords = b.split(/(\s+)/);
  const bSet = new Set(bWords.map(w => w.trim().toLowerCase()));
  return aWords.map(w => {
    const key = w.trim().toLowerCase();
    if (!key) return w;
    return bSet.has(key) ? escHtml(w) : `<span class="diff-del">${escHtml(w)}</span>`;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function closeInspector() {
  const el = document.getElementById('inspectorSection');
  if (el) el.style.display = 'none';
  if (selectedRow) { selectedRow.classList.remove('selected'); selectedRow = null; }
}

// ── CLEAR ────────────────────────────────────────────────────────────────────
clearBtn.addEventListener('click', () => {
  results = [];
  main.querySelectorAll('.render-section').forEach(el => el.remove());
  emptyState.style.display = 'flex';
  progressWrap.classList.remove('visible');
  progressFill.style.width = '0%';
  selectedRow = null;
});

runBtn.addEventListener('click', runBenchmark);
settingsBtn.addEventListener('click', openSettings);
settingsCloseBtn.addEventListener('click', closeSettings);
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) closeSettings();
});
tokenSaveBtn.addEventListener('click', () => {
  hfToken = tokenInput.value.trim().replace(/^Bearer\s+/i, "");
  if (hfToken) localStorage.setItem(TOKEN_STORAGE_KEY, hfToken);
  else localStorage.removeItem(TOKEN_STORAGE_KEY);
  updateTokenIndicator();
  closeSettings();
});
tokenClearBtn.addEventListener('click', () => {
  hfToken = "";
  tokenInput.value = "";
  localStorage.removeItem(TOKEN_STORAGE_KEY);
  updateTokenIndicator();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildTestCaseList();
updateTokenIndicator();

if (window.location.protocol === "file:") {
  console.warn("Running from file:// can trigger CORS blocks. Use a local server.");
}
</script>
